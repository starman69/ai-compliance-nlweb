name: CI

# The "must stay green" checks on every commit, on PRs into main, and on merges:
#   1. unit tests   — pure modules + NLWeb /ask·/mcp contract + bicep↔app + compose↔app
#                     (NLWEB_BACKEND=mock is pinned in tests/conftest.py — no model server)
#   2. bicep build  — the azure-profile IaC compiles with zero warnings
#   3. compose      — the local docker-compose stack is a valid config
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (mock backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: python -m pytest tests/unit -q

  bicep-build:
    name: Bicep build (zero warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep CLI
        run: |
          curl -sLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep && sudo mv bicep /usr/local/bin/bicep
          bicep --version
      - name: Build (fail on any error or warning)
        run: |
          bicep build infra/bicep/main.bicep 2> bicep.log || { echo "::error::bicep build failed"; cat bicep.log; exit 1; }
          if grep -qi "warning" bicep.log; then
            echo "::error::bicep emitted warnings (must be zero)"; cat bicep.log; exit 1;
          fi

  compose-config:
    name: Compose config valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate local docker-compose
        run: |
          # The api service has env_file: [.env] (gitignored); seed it from the
          # committed example, exactly as the README's quick start does.
          cp infra/compose/.env.example infra/compose/.env
          docker compose -f infra/compose/docker-compose.yml config --quiet
