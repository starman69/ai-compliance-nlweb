# =============================================================================
# AI Compliance NLWeb — corpus manifest
# =============================================================================
# Single source of truth for the corpus (PLAN.md §2). Versioned; the fetch
# script (scripts/fetch_corpus.py) and ingestion (scripts/ingest.py) read this.
#
# The corpus is 100% OPEN-ACCESS. No paywalled content ships in this public repo.
# Copyrighted ISO/IEC standards are represented by `source_type: authored_summary`
# entries — open, non-normative summaries (scope, Harmonized-Structure clauses
# 4–10, Annex A themes, cross-refs) compiled from public facts, committed under
# manifest/summaries/. They are NOT the normative standard text.
#
# Per-doc fields:
#   id              stable kebab-case key (also the source filename stem)
#   title           full official title
#   short_name      compact label used in citations: "[short_name §section, p.N]"
#   tier            tier1..tier5 (see `tiers` below)
#   jurisdiction    scope token, AND-ed into the Qdrant filter via NLWeb `site`
#   framework_family clusters related docs in the corpus explorer (tier→family→doc)
#   authority       issuing body
#   official_url    canonical source; fetch script re-verifies at pull time
#   format          pdf | html | md
#   access          open  (always — no paywalled docs in this repo)
#   source_type     fetch | authored_summary
#   status          in_force | proposed | voluntary | historical
#   version_date    adoption/publication date (YYYY or YYYY-MM); manifest is truth
#   path            (authored_summary only) summary file under manifest/
#   license_note    reuse/licensing note
#   notes           provenance, currency, verification flags
#
# Currency verified May 2026. URLs flagged "verify" are best-known canonical
# locations that may have moved (esp. whitehouse.gov pages after the 2025 admin
# change); the fetch script re-checks each at pull time.
# =============================================================================

version: 1
updated: 2026-05-23
total_documents: 48
# Embeddings are per-profile — a store's dim is immutable (PLAN.md §4):
embedding_local: mxbai-embed-large        # 1024-d → Qdrant
embedding_azure: text-embedding-3-small   # 1536-d → Azure AI Search

# Scope tokens used by `jurisdiction` and the NLWeb `site` param.
jurisdictions:
  int:    International / global
  eu:     European Union
  uk:     United Kingdom
  ca:     Canada
  sg:     Singapore
  br:     Brazil
  cn:     China
  us:     United States (federal)
  us-co:  US — Colorado
  us-tx:  US — Texas
  us-ut:  US — Utah
  us-ca:  US — California
  us-ny:  US — New York (NYC)
  us-il:  US — Illinois
  vendor: Vendor / industry framework

# Display order + labels for the corpus explorer.
tiers:
  - id: tier1
    name: Global / International standards
    blurb: ISO/IEC AI standards (open summaries), OECD, UNESCO, G7, Council of Europe.
  - id: tier2
    name: EU / UK / National frameworks
    blurb: EU AI Act & digital rulebook, GDPR, UK, Canada, Singapore, Brazil, China.
  - id: tier3
    name: US Federal
    blurb: NIST AI RMF family, OMB memos, executive orders, NIST CSF/800-53, FedRAMP.
  - id: tier4
    name: US State
    blurb: Colorado, Texas, Utah, California, New York City, Illinois.
  - id: tier5
    name: Sector / Cloud
    blurb: Cloud Security Alliance, Microsoft, Google.

